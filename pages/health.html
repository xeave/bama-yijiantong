<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>血压血糖记录</title>
    <meta name="description" content="适老化大字版血压血糖记录工具，支持本地保存。"/>
    <link rel="stylesheet" href="../assets/styles.css" />
    <script defer src="../assets/site.js"></script>
    <script defer src="../assets/health.js"></script>
  </head>
  <body>
    <div class="background-orb orb-1"></div>
    <div class="background-orb orb-2"></div>

    <header class="site-header">
      <a class="site-mark" href="../index.html">爸妈一键通</a>
      <nav class="top-nav" aria-label="页面导航">
        <a href="../index.html">返回首页</a>
        <a href="./meds.html">用药提醒</a>
        <a href="./nav.html">常用网址</a>
      </nav>
    </header>

    <main class="page-shell">
      <section class="panel intro-panel" data-reveal>
        <p class="eyebrow">工具 02</p>
        <h1 class="page-title">血压血糖记录</h1>
        <p class="section-note">
          本页只用于记录和查看数据，不提供医疗诊断建议。适合日常手动登记，方便和家人沟通近期变化。
        </p>
      </section>

      <section class="stat-grid" data-reveal>
        <article class="panel stat-panel">
          <p class="stat-label">已记录条数</p>
          <p id="health-count" class="stat-value">0</p>
        </article>
        <article class="panel stat-panel">
          <p class="stat-label">最近血压</p>
          <p id="latest-bp" class="stat-value">暂无</p>
        </article>
        <article class="panel stat-panel">
          <p class="stat-label">最近血糖</p>
          <p id="latest-glucose" class="stat-value">暂无</p>
        </article>
      </section>

      <section class="tool-layout">
        <article class="panel" data-reveal>
          <div class="section-head">
            <div>
              <h2 class="section-title small">新增记录</h2>
              <p class="section-note">建议每次测量后立即登记，日期默认为今天。</p>
            </div>
          </div>

          <form id="health-form" class="form-grid">
            <label class="field">
              <span>日期</span>
              <input id="record-date" type="date" required />
            </label>

            <label class="field">
              <span>收缩压</span>
              <input id="systolic" type="number" inputmode="numeric" min="50" max="260" placeholder="例如：128 mmHg" required />
            </label>

            <label class="field">
              <span>舒张压</span>
              <input id="diastolic" type="number" inputmode="numeric" min="30" max="180" placeholder="例如：82 mmHg" required />
            </label>

            <label class="field">
              <span>血糖</span>
              <input id="glucose" type="number" inputmode="decimal" min="0" max="50" step="0.1" placeholder="例如：6.1 mmol/L" required />
            </label>

            <label class="field field-full">
              <span>备注</span>
              <textarea id="health-notes" maxlength="80" placeholder="例如：饭后两小时测量，可不填"></textarea>
            </label>

            <div class="form-actions">
              <button class="button button-primary" type="submit">保存记录</button>
              <button class="button button-ghost" id="health-clear" type="button">清空全部</button>
            </div>
          </form>
        </article>

        <article class="panel" data-reveal>
          <div class="section-head">
            <div>
              <h2 class="section-title small">历史记录</h2>
              <p id="health-summary" class="section-note">还没有保存任何健康记录。</p>
            </div>
          </div>

          <div id="health-list" class="list-stack"></div>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <p>健康记录仅保存在当前设备浏览器中。</p>
      <a href="../index.html">回到首页</a>
    </footer>
  </body>
</html>
